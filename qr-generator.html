<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generate QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:#1b0a1f;font-family:'Lato',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{background:rgba(255,255,255,0.04);border:1px solid rgba(232,67,106,0.25);border-radius:24px;padding:44px 36px;max-width:420px;width:100%;text-align:center;backdrop-filter:blur(16px);}
    h1{font-size:22px;color:#fff;margin-bottom:6px;}
    p{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:28px;line-height:1.7;}
    input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(232,67,106,0.3);background:rgba(255,255,255,0.06);color:#fff;font-size:14px;outline:none;margin-bottom:14px;transition:border-color .2s;}
    input:focus{border-color:#e8436a;}
    input::placeholder{color:rgba(255,255,255,0.25);}
    button{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#e8436a,#f5c842);border:none;color:#1b0a1f;font-weight:700;font-size:15px;cursor:pointer;transition:transform .2s,box-shadow .2s;}
    button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,67,106,0.4);}
    #qr-wrap{margin-top:32px;display:none;}
    #qr-box{display:inline-block;padding:16px;background:#fff;border-radius:16px;box-shadow:0 0 40px rgba(245,200,66,0.2);}
    #qr-box canvas, #qr-box img{display:block;}
    .dl-btn{display:inline-block;margin-top:18px;padding:10px 28px;border-radius:50px;background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.3);color:#f5c842;font-size:13px;cursor:pointer;text-decoration:none;transition:background .2s;}
    .dl-btn:hover{background:rgba(245,200,66,0.22);}
    .note{margin-top:14px;font-size:12px;color:rgba(255,255,255,0.3);line-height:1.7;}
  </style>
</head>
<body>
<div class="box">
  <h1>🎯 QR Code Generator</h1>
  <p>Masukkan URL halaman birthday kamu<br>(setelah di-deploy / hosting)</p>
  <input type="text" id="url-input" placeholder="https://nama-kamu.github.io/birthday.html"/>
  <button onclick="generate()">✨ Buat QR Code</button>
  <div id="qr-wrap">
    <div id="qr-box"></div>
    <br>
    <a class="dl-btn" id="dl-link" download="qrcode.png">⬇️ Download QR Code</a>
    <p class="note">Print QR ini & berikan ke sahabatmu.<br>Saat di-scan, akan langsung ke halaman ucapan! 🎂</p>
  </div>
</div>
<script>
  function generate() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) { alert('Masukkan URL terlebih dahulu!'); return; }
    const wrap = document.getElementById('qr-wrap');
    const box  = document.getElementById('qr-box');
    box.innerHTML = '';
    wrap.style.display = 'block';

    new QRCode(box, {
      text: url,
      width: 220,
      height: 220,
      colorDark: '#1b0a1f',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    // enable download after render
    setTimeout(() => {
      const img = box.querySelector('img') || box.querySelector('canvas');
      if (img) {
        const dl = document.getElementById('dl-link');
        if (img.tagName === 'CANVAS') {
          dl.href = img.toDataURL('image/png');
        } else {
          dl.href = img.src;
        }
      }
    }, 300);
  }
</script>
</body>
</html>
